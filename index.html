<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Benvenuto</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: 'Segoe UI', sans-serif;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    p.subtitle {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 32px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4f46e5;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    .greeting {
      margin-top: 32px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #4f46e5;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .greeting.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Come ti chiami?</h1>
    <p class="subtitle">Inserisci il tuo nome per ricevere il saluto</p>

    <input type="text" id="nameInput" placeholder="Il tuo nome..." autocomplete="off" />
    <button onclick="saluta()">Saluta</button>

    <div class="greeting" id="greeting"></div>
  </div>

  <script>
    const input = document.getElementById('nameInput');
    const greeting = document.getElementById('greeting');

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saluta();
    });

    function saluta() {
      const name = input.value.trim();
      if (!name) return;

      greeting.classList.remove('show');
      setTimeout(() => {
        greeting.textContent = `Ciao, ${name}!`;
        greeting.classList.add('show');
      }, 50);
    }
  </script>
</body>
</html>
